<!-- 下载预设页面 -->
<div id="page-download" class="page flex-1 overflow-y-auto p-8 hidden">
  <div class="flex items-center justify-between h-12 mb-6 shrink-0 w-full">
    <h1 class="text-2xl font-bold text-gray-900 tracking-tight">配置您的模型预设</h1>
    <div class="flex items-center gap-3 relative">
      <button onclick="document.querySelector('[data-page=\'home\']').click()" class="btn-secondary px-6 py-2.5 rounded-xl text-sm font-medium transition-colors flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 17l-5-5m0 0l5-5m-5 5h12"/></svg>
        <span>上一步</span>
      </button>
      <button id="downloadBtn" onclick="document.querySelector('[data-page=\'calibrate\']').click()" class="btn-primary px-6 py-2.5 rounded-xl text-sm font-medium hover:bg-blue-600 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors flex items-center gap-2" disabled>
        <span>下一步</span>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
      </button>
      <div id="downloadHintWrapper" class="absolute -bottom-6 right-1 flex items-center gap-1 text-amber-500 transition-opacity duration-300">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <span class="text-[11px]">请完成选项</span>
      </div>
    </div>
  </div>
  <div class="max-w-4xl flex flex-col h-full">
    <p class="text-sm text-gray-500 mb-6">选择版本类型和发布日期以获取对应的预设配置</p>

    <div class="max-w-4xl space-y-8 flex-1">
      <!-- 步骤一：选择版本类型 -->
      <div>
        <div class="flex items-center gap-3 mb-4">
          <svg class="w-6 h-6 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
          </svg>
          <div>
            <h2 class="text-base font-semibold text-gray-900">选择版本类型</h2>
            <p class="text-xs text-gray-500">根据您的打印机配置选择合适的版本</p>
          </div>
        </div>

        <!-- 版本卡片 - 垂直单列布局 -->
        <div class="flex flex-col gap-3">
          <!-- 标准版 -->
          <div class="version-card group bg-white rounded-2xl border border-gray-200 p-4 cursor-pointer transition-all duration-200 hover:border-blue-300 hover:shadow-sm" data-version="standard" onclick="selectVersion(this, 'standard')">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 rounded-xl flex items-center justify-center flex-shrink-0 transition-colors" style="background: var(--theme-standard-bg); color: var(--theme-standard-text)">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                  <span class="font-semibold text-gray-900">标准版</span>
                </div>
                <p class="text-sm text-gray-500 truncate">v3原版，适合到手即用追求稳定的用户</p>
              </div>
              <div class="check-indicator w-6 h-6 rounded-full border-2 border-gray-200 flex items-center justify-center flex-shrink-0 transition-all duration-200">
                <svg class="w-4 h-4 text-white opacity-0 transition-opacity duration-200" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                </svg>
              </div>
            </div>
          </div>

          <!-- 快拆版 -->
          <div class="version-card group bg-white rounded-2xl border border-gray-200 p-4 cursor-pointer transition-all duration-200 hover:border-orange-300 hover:shadow-sm" data-version="quick" onclick="selectVersion(this, 'quick')">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 rounded-xl flex items-center justify-center flex-shrink-0 transition-colors" style="background: var(--theme-quick-bg); color: var(--theme-quick-text)">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/>
                </svg>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                  <span class="font-semibold text-gray-900">快拆版</span>
                </div>
                <p class="text-sm text-gray-500 truncate">v3快拆版，适合自行打印安装的用户</p>
              </div>
              <div class="check-indicator w-6 h-6 rounded-full border-2 border-gray-200 flex items-center justify-center flex-shrink-0 transition-all duration-200">
                <svg class="w-4 h-4 text-white opacity-0 transition-opacity duration-200" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                </svg>
              </div>
            </div>
          </div>

          <!-- Lite版 -->
          <div class="version-card group bg-white rounded-2xl border border-gray-200 p-4 cursor-pointer transition-all duration-200 hover:border-purple-300 hover:shadow-sm" data-version="lite" onclick="selectVersion(this, 'lite')">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 rounded-xl flex items-center justify-center flex-shrink-0 transition-colors" style="background: var(--theme-lite-bg); color: var(--theme-lite-text)">
                <div class="flex items-center justify-center w-full h-full">
                  <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6"/>
                  </svg>
                </div>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                  <span class="font-semibold text-gray-900">Lite版</span>
                </div>
                <p class="text-sm text-gray-500 truncate">适合P系列，以及其他品牌CoreXY打印机</p>
              </div>
              <div class="check-indicator w-6 h-6 rounded-full border-2 border-gray-200 flex items-center justify-center flex-shrink-0 transition-all duration-200">
                <svg class="w-4 h-4 text-white opacity-0 transition-opacity duration-200" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                </svg>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 步骤二：选择发布日期 -->
      <div>
        <div class="flex items-center gap-3 mb-4">
          <svg id="step2Badge" class="w-6 h-6 text-gray-400 flex-shrink-0 transition-colors duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
          </svg>
          <div>
            <h2 class="text-base font-semibold text-gray-900">选择发布日期</h2>
            <p class="text-xs text-gray-500">选择预设文件的发布版本</p>
          </div>
        </div>

        <!-- 高级居中卡片 -->
        <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
          <div class="flex flex-col items-center">
            <div class="w-full max-w-md">
              <label class="block text-sm font-medium text-gray-700 mb-2 text-center">发布日期</label>
              <div id="dateSelector" class="relative transition-opacity duration-200">
                <!-- 日历图标 -->
                <div class="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none">
                  <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/>
                  </svg>
                </div>
                <!-- 自定义下拉选择器 -->
                <select id="dateSelect" class="appearance-none w-full pl-12 pr-10 py-3.5 rounded-xl border border-gray-200 bg-gray-50 text-sm text-gray-400 cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" disabled>
                  <option value="">请先选择模型版本</option>
                  <option value="2024-10-24">2024-10-24 (最新)</option>
                  <option value="2024-10-15">2024-10-15</option>
                </select>
                <!-- 自定义向下箭头 -->
                <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none">
                  <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                  </svg>
                </div>
              </div>
              <p class="text-xs text-gray-400 mt-3 text-center">选择版本类型后将自动加载可用日期</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
