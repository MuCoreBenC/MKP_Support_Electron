<!-- 主题设置页面 -->
<div id="page-theme" class="page flex-1 overflow-y-auto p-8 hidden">
  <div class="flex items-center justify-between h-12 mb-6 shrink-0 w-full">
    <h1 class="text-2xl font-bold text-gray-900 tracking-tight">外观与主题</h1>
  </div>
  <div class="max-w-4xl">
    <p class="text-sm text-gray-500 mb-6">自定义软件的全局界面风格及预设卡片的强调色。</p>

    <div class="bg-white rounded-2xl border border-gray-100 shadow-[0_2px_10px_rgba(0,0,0,0.02)] p-6 mb-6">
      <div class="text-sm font-semibold text-gray-900 mb-4">外观设置</div>
      <div class="grid grid-cols-3 gap-4 max-w-[540px]">
        <button onclick="setThemeMode('light')" class="mode-btn-light flex flex-col items-center gap-3 p-4 rounded-xl border-2 transition-all cursor-pointer relative z-10">
          <div class="w-full h-16 rounded-lg bg-[#f3f4f6] border border-[#e5e7eb] overflow-hidden flex flex-col">
            <div class="h-3 bg-[#ffffff] border-b border-[#e5e7eb]"></div>
            <div class="flex-1 flex"><div class="w-1/3 bg-[#f9fafb] border-r border-[#e5e7eb]"></div><div class="flex-1 bg-[#ffffff]"></div></div>
          </div>
          <span class="mode-text-light text-sm font-medium">白天</span>
        </button>

        <button onclick="setThemeMode('dark')" class="mode-btn-dark flex flex-col items-center gap-3 p-4 rounded-xl border-2 transition-all cursor-pointer relative z-10">
          <div class="w-full h-16 rounded-lg bg-[#1a1a1a] border border-[#333] overflow-hidden flex flex-col">
            <div class="h-3 bg-[#222] border-b border-[#333]"></div>
            <div class="flex-1 flex"><div class="w-1/3 bg-[#111] border-r border-[#333]"></div><div class="flex-1 bg-[#1a1a1a]"></div></div>
          </div>
          <span class="mode-text-dark text-sm font-medium">夜间</span>
        </button>

        <button onclick="setThemeMode('system')" class="mode-btn-system flex flex-col items-center gap-3 p-4 rounded-xl border-2 transition-all cursor-pointer relative z-10">
          <div class="w-full h-16 rounded-lg border border-[#e5e7eb] overflow-hidden flex">
            <div class="flex-1 bg-[#f3f4f6] flex flex-col border-r border-[#e5e7eb]">
              <div class="h-3 bg-[#ffffff] border-b border-[#e5e7eb]"></div>
              <div class="flex-1 bg-[#ffffff]"></div>
            </div>
            <div class="flex-1 bg-[#1a1a1a] flex flex-col">
              <div class="h-3 bg-[#222] border-b border-[#333]"></div>
              <div class="flex-1 bg-[#1a1a1a]"></div>
            </div>
          </div>
          <span class="mode-text-system text-sm font-medium">跟随系统</span>
        </button>
      </div>
    </div>

    <div class="bg-white rounded-2xl border border-gray-100 shadow-[0_2px_10px_rgba(0,0,0,0.02)] p-6">
      <div class="text-sm font-semibold text-gray-900 mb-1">版本专属主题色</div>
      <p class="text-xs text-gray-500 mb-6">为不同预设版本指定专属颜色，实时同步所有页面和侧边栏状态。</p>
      
      <div class="space-y-5">
        <div class="flex items-center justify-between p-3 rounded-xl hover:bg-gray-50 transition-colors">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center transition-colors" style="background: var(--theme-standard-bg); color: var(--theme-standard-text)">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/></svg>
            </div>
            <span class="text-sm font-medium text-gray-700">标准版外观</span>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="setVersionTheme('standard', '#3B82F6', '#EFF6FF')" class="w-6 h-6 rounded-full bg-blue-500 hover:scale-110 transition-transform shadow-sm"></button>
            <button onclick="setVersionTheme('standard', '#10B981', '#D1FAE5')" class="w-6 h-6 rounded-full bg-emerald-500 hover:scale-110 transition-transform shadow-sm"></button>
            <button onclick="setVersionTheme('standard', '#F43F5E', '#FFE4E6')" class="w-6 h-6 rounded-full bg-rose-500 hover:scale-110 transition-transform shadow-sm"></button>
          </div>
        </div>

        <div class="flex items-center justify-between p-3 rounded-xl hover:bg-gray-50 transition-colors border-t border-gray-100">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center transition-colors" style="background: var(--theme-quick-bg); color: var(--theme-quick-text)">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <span class="text-sm font-medium text-gray-700">快拆版外观</span>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="setVersionTheme('quick', '#F59E0B', '#FFFBEB')" class="w-6 h-6 rounded-full bg-amber-500 hover:scale-110 transition-transform shadow-sm"></button>
            <button onclick="setVersionTheme('quick', '#06B6D4', '#CCFBF1')" class="w-6 h-6 rounded-full bg-cyan-500 hover:scale-110 transition-transform shadow-sm"></button>
            <button onclick="setVersionTheme('quick', '#8B5CF6', '#F3E8FF')" class="w-6 h-6 rounded-full bg-violet-500 hover:scale-110 transition-transform shadow-sm"></button>
          </div>
        </div>

        <div class="flex items-center justify-between p-3 rounded-xl hover:bg-gray-50 transition-colors border-t border-gray-100">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center transition-colors" style="background: var(--theme-lite-bg); color: var(--theme-lite-text)">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6"/></svg>
            </div>
            <span class="text-sm font-medium text-gray-700">Lite版外观</span>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="setVersionTheme('lite', '#A855F7', '#FAF5FF')" class="w-6 h-6 rounded-full bg-purple-500 hover:scale-110 transition-transform shadow-sm"></button>
            <button onclick="setVersionTheme('lite', '#3B82F6', '#EFF6FF')" class="w-6 h-6 rounded-full bg-blue-500 hover:scale-110 transition-transform shadow-sm"></button>
            <button onclick="setVersionTheme('lite', '#F97316', '#FFF7ED')" class="w-6 h-6 rounded-full bg-orange-500 hover:scale-110 transition-transform shadow-sm"></button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
