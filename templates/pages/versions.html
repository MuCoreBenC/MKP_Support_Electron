<!-- 版本控制页面 -->
<div id="page-versions" class="page flex-1 overflow-y-auto p-8 hidden">
  <div class="flex items-center justify-between h-12 mb-6 shrink-0 w-full">
    <h1 class="text-2xl font-bold text-gray-900 tracking-tight">版本控制</h1>
    <button onclick="checkForUpdates()" class="btn-primary px-4 py-2 rounded-xl text-sm font-medium flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      检查更新
    </button>
  </div>
  <div class="max-w-4xl">
    <div class="flex items-center gap-3 mb-5">
      <div class="relative flex-1">
        <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
        </svg>
        <input type="text" id="versionSearch" placeholder="搜索版本号或更新描述..." class="input-field w-full pl-11 pr-4 py-2.5 rounded-xl text-sm">
      </div>
      <button onclick="toggleExpandMore()" class="btn-secondary px-5 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2 flex-shrink-0">
        <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <span id="expandBtnText">历史版本</span>
      </button>
    </div>

    <div id="versionList" class="space-y-3"></div>
  </div>
</div>
