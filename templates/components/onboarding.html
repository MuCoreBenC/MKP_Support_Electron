<!-- 新手引导页 -->
<div id="onboarding" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-center justify-center p-8">
  <div class="bg-white rounded-2xl card-shadow w-[520px] max-h-[90vh] animate-scale-in flex flex-col overflow-hidden">
    <!-- 头部 -->
    <div class="p-5 pb-3 flex-shrink-0">
      <div class="text-center mb-4">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-blue-600 mb-2">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0021 18V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v12a2.25 2.25 0 002.25 2.25z"/>
          </svg>
        </div>
        <h1 class="text-lg font-semibold text-gray-900">支撑面改善工具</h1>
        <p class="text-[11px] text-gray-400 mt-0.5">MKP Support</p>
      </div>

      <!-- 步骤条 -->
      <div class="flex items-center justify-center">
        <div class="flex items-center step-item active" id="step1" onclick="goToStep(1)">
          <div class="flex items-center justify-center w-7 h-7 rounded-full bg-gray-200 text-xs font-medium step-number">1</div>
          <span class="ml-1.5 text-xs font-medium step-text">环境检测</span>
        </div>
        <div class="w-12 h-px bg-gray-200 mx-2"></div>
        <div class="flex items-center step-item" id="step2" onclick="goToStep(2)">
          <div class="flex items-center justify-center w-7 h-7 rounded-full bg-gray-200 text-gray-400 text-xs font-medium step-number">2</div>
          <span class="ml-1.5 text-xs text-gray-400 step-text">选择机型</span>
        </div>
        <div class="w-12 h-px bg-gray-200 mx-2"></div>
        <div class="flex items-center step-item" id="step3" onclick="goToStep(3)">
          <div class="flex items-center justify-center w-7 h-7 rounded-full bg-gray-200 text-gray-400 text-xs font-medium step-number">3</div>
          <span class="ml-1.5 text-xs text-gray-400 step-text">基础参数</span>
        </div>
      </div>
    </div>

    <!-- 内容区域 -->
    <div class="flex-1 overflow-y-auto px-5 py-2 min-h-0">
      <!-- 步骤1：环境检测 -->
      <div id="stepContent1" class="step-content">
        <div class="bg-gray-50 rounded-xl p-4">
          <div class="flex items-center justify-center mb-3">
            <svg class="w-4 h-4 text-blue-500 animate-spin mr-2" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span class="text-sm text-gray-600">正在检测系统中已安装的切片软件路径...</span>
          </div>
          <div class="flex items-center gap-2">
            <input type="text" value="C:\Program Files\Bambu Studio" class="input-field input-readonly flex-1 px-3 py-2 rounded-lg text-sm" readonly>
            <button onclick="manualSelectPath()" class="btn-secondary px-3 py-2 rounded-lg text-xs flex items-center gap-1.5 whitespace-nowrap">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
              </svg>
              手动选择
            </button>
          </div>
        </div>
      </div>

      <!-- 步骤2：选择机型 -->
      <div id="stepContent2" class="step-content hidden">
        <div class="flex items-center gap-2 mb-3">
          <span class="text-sm font-medium text-gray-700">选择您的打印机</span>
          <span id="selectedModelBadge" class="hidden px-2 py-0.5 bg-blue-50 text-blue-600 rounded text-xs font-medium"></span>
        </div>
        
        <div class="flex gap-3">
          <div class="w-28 flex-shrink-0">
            <div class="text-[10px] text-gray-400 mb-1 uppercase tracking-wide">品牌</div>
            <div class="macos-list" style="height: 180px; overflow-y: auto;">
              <div id="wizardBrandList"></div>
            </div>
          </div>
          <div class="flex-1">
            <div class="text-[10px] text-gray-400 mb-1 uppercase tracking-wide">机型</div>
            <div class="macos-list" style="height: 180px; overflow-y: auto;">
              <div id="wizardModelList"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- 步骤3：基础参数 -->
      <div id="stepContent3" class="step-content hidden">
        <div class="text-sm font-medium text-gray-700 mb-3">当前机型偏移参数</div>
        <div class="grid grid-cols-3 gap-3 mb-3">
          <div class="bg-gray-50 rounded-lg p-3 text-center border border-gray-100">
            <div class="text-[10px] text-gray-400 mb-0.5">X 偏移</div>
            <div class="text-xl font-bold text-gray-700" id="wizardXOffset">--</div>
            <div class="text-[10px] text-gray-400">mm</div>
          </div>
          <div class="bg-gray-50 rounded-lg p-3 text-center border border-gray-100">
            <div class="text-[10px] text-gray-400 mb-0.5">Y 偏移</div>
            <div class="text-xl font-bold text-gray-700" id="wizardYOffset">--</div>
            <div class="text-[10px] text-gray-400">mm</div>
          </div>
          <div class="bg-gray-50 rounded-lg p-3 text-center border border-gray-100">
            <div class="text-[10px] text-gray-400 mb-0.5">Z 偏移</div>
            <div class="text-xl font-bold text-gray-700" id="wizardZOffset">--</div>
            <div class="text-[10px] text-gray-400">mm</div>
          </div>
        </div>
        <div class="text-[10px] text-gray-400 text-center">以上参数仅供参考，请在实际使用中进行校准</div>
      </div>
    </div>

    <!-- 底部 -->
    <div class="p-5 pt-3 flex-shrink-0 border-t border-gray-50">
      <div class="flex items-center justify-between">
        <button id="leftBtn" onclick="skipOnboarding()" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">
          跳过引导
        </button>
        <button id="rightBtn" onclick="goToStep(2)" class="btn-primary px-5 py-2 rounded-lg text-sm font-medium">下一步</button>
      </div>
    </div>
  </div>
</div>
